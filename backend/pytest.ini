[pytest]
# Configuração do pytest

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
pythonpath = .

# Opções adicionais
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Marcadores customizados
markers =
    slow: testes que são lentos (deselecione com '-m "not slow"')
    integration: testes de integração que precisam DB
    unit: testes unitários rápidos
    asyncio: testes assincronos

# Async
asyncio_mode = auto

# Cobertura
[coverage:run]
branch = True
source = app
omit =
    */tests/*
    */migrations/*
    */__init__.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abstract
